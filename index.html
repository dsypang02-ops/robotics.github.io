<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>雙計時器 · 隊伍A紅/隊伍B藍 · 專業比賽版</title>
    <style>
        :root {
            --bg1: #2d3e4e;
            --bg2: #1f2e3a;
            --panel: #25323e;
            --panel-dark: #1e2b36;
            --gold: #b88b4b;
            --gold-light: #f3c26b;
            --text-main: #ecdbbd;
            --text-soft: #dacebc;
            --red: #b53b3b;
            --blue: #3b6fb5;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
            overscroll-behavior: none;
            background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 100%);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-app {
            background: var(--panel);
            border-radius: 2.5rem 2.5rem 2rem 2rem;
            box-shadow: 0 30px 45px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(200,180,130,0.3);
            padding: max(1rem, env(safe-area-inset-top)) 2rem max(1rem, env(safe-area-inset-bottom)) 2rem;
            width: min(96vw, 900px);
            min-height: min(96vh, 760px);
            border-bottom: 6px solid var(--gold);
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin: 0 0 1rem 0;
            font-weight: 500;
            font-size: clamp(1.5rem, 2.8vw, 2.2rem);
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 3px 6px #0f1a24;
        }

        .main-content {
            flex: 1 0 auto;
        }

        .pair-panel {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .team-card {
            background: var(--panel-dark);
            border-radius: 2.2rem 2.2rem 1.8rem 1.8rem;
            flex: 1 1 280px;
            min-width: 260px;
            box-shadow: inset 0 -5px 0 #121c24, 0 12px 20px #0b141c;
            padding: 1.4rem 0.9rem 1.2rem;
            text-align: center;
            border-top: 3px solid;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        .team-card.active-turn {
            box-shadow: 0 0 0 4px #f5e56b, 0 15px 25px black;
            transform: scale(1.01);
            border-top-color: #f5d742;
        }

        .team-a { border-top-color: #e15a5a; }
        .team-b { border-top-color: #5a9fe1; }

        .team-label {
            font-size: clamp(1.4rem, 2.8vw, 1.9rem);
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #ebd8b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .team-a .team-label { color: #ffb6b6; }
        .team-b .team-label { color: #b6d6ff; }

        .time-display {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: clamp(3.6rem, 8vw, 5.6rem);
            font-weight: 700;
            background: #0f1c24;
            color: #fde9c9;
            padding: 0.25rem;
            border-radius: 1.8rem;
            margin: 0.3rem 0 0.6rem;
            box-shadow: inset 0 0 15px #000000, 0 2px 0 #4f626f;
            letter-spacing: clamp(2px, 1vw, 8px);
            text-shadow: 0 0 8px #fdb95b;
            line-height: 1.15;
        }

        .limit-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            margin: 0.8rem 0 0.3rem;
            background: #1e2e3b;
            padding: 0.45rem 0.8rem;
            border-radius: 3rem;
            border: 1px solid #5b7485;
        }

        .limit-control label {
            color: #d2c2ab;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .limit-control input {
            width: 80px;
            background: #243b48;
            border: none;
            border-bottom: 3px solid #c29a5a;
            color: #ffdfaa;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            padding: 0.2rem 0;
            border-radius: 1rem 1rem 0 0;
            outline: none;
            font-family: 'Courier New', monospace;
            appearance: none;
            -webkit-appearance: none;
        }

        .limit-control input:focus {
            background: #1f3542;
            border-bottom-color: var(--gold-light);
        }

        .limit-control span {
            font-size: 1.2rem;
            color: #bdafa0;
        }

        .team-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 0.9rem 0 1.2rem;
            flex-wrap: wrap;
        }

        button {
            touch-action: manipulation;
        }

        .btn-team, .bottom-btn {
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 4rem;
            cursor: pointer;
            transition: transform 0.04s linear, border-bottom-width 0.04s linear, filter 0.08s ease;
        }

        .btn-team:active, .bottom-btn:active {
            transform: translateY(4px);
        }

        .btn-team {
            flex: 1 1 220px;
            min-width: 220px;
            border-bottom: 6px solid #1c2f3a;
            font-size: clamp(1.4rem, 3vw, 2rem);
            padding: 1rem 0.5rem;
            box-shadow: 0 8px 0 #0f1e27, 0 5px 18px black;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 72px;
        }

        .btn-team:active {
            border-bottom-width: 2px;
        }

        .btn-team-a { background: var(--red); }
        .btn-team-b { background: var(--blue); }

        .status-area {
            background: #1d2c38;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            color: var(--text-soft);
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            border: 1px solid #60788a;
            margin: 0.8rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .turn-indicator {
            background: #314a5a;
            padding: 0.45rem 1.2rem;
            border-radius: 3rem;
            font-weight: 700;
            color: #ffdb8e;
        }

        .alert-sign {
            color: #ffb9a9;
            font-weight: 600;
        }

        .bottom-controls {
            margin-top: auto;
            padding-top: 1.4rem;
            border-top: 2px dashed #5e7485;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .bottom-btn {
            border-bottom: 5px solid #293b47;
            font-size: clamp(1.2rem, 2.4vw, 1.6rem);
            padding: 0.95rem 2rem;
            box-shadow: 0 6px 0 #1e2e39;
            min-width: 180px;
            min-height: 68px;
        }

        .bottom-btn:active {
            border-bottom-width: 2px;
        }

        .btn-pause-bottom {
            background: #5f6c7a;
            border-bottom-color: #3d4b57;
        }

        .btn-reset-bottom {
            background: #8b6f50;
            border-bottom-color: #5f4a35;
        }

        .footer-note {
            text-align: center;
            color: #90a0af;
            margin-top: 0.9rem;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .reset-warning {
            color: #ffd8a8;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            body {
                align-items: stretch;
            }

            .timer-app {
                width: 100vw;
                min-height: 100vh;
                border-radius: 0;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .pair-panel {
                gap: 0.9rem;
            }

            .team-card {
                min-width: 100%;
            }

            .bottom-controls {
                gap: 0.75rem;
            }

            .bottom-btn,
            .btn-team {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="timer-app">
    <div class="main-content">
        <h1>⚡ 隊伍A（紅） · 隊伍B（藍）⚡</h1>

        <div class="pair-panel">
            <div class="team-card team-a" id="teamACard">
                <div class="team-label">🔴 隊伍 A</div>
                <div class="time-display" id="teamATime">04:00</div>
                <div class="limit-control">
                    <label for="teamALimitInput">限時</label>
                    <input type="number" id="teamALimitInput" min="1" max="99" value="4" step="1" inputmode="numeric">
                    <span>分鐘</span>
                </div>
            </div>

            <div class="team-card team-b" id="teamBCard">
                <div class="team-label">🔵 隊伍 B</div>
                <div class="time-display" id="teamBTime">04:00</div>
                <div class="limit-control">
                    <label for="teamBLimitInput">限時</label>
                    <input type="number" id="teamBLimitInput" min="1" max="99" value="4" step="1" inputmode="numeric">
                    <span>分鐘</span>
                </div>
            </div>
        </div>

        <div class="team-buttons">
            <button class="btn-team btn-team-a" id="btnAToggle" type="button">🔴 隊伍A 開始</button>
            <button class="btn-team btn-team-b" id="btnBToggle" type="button">🔵 隊伍B 開始</button>
        </div>

        <div class="status-area">
            <span class="turn-indicator" id="turnDisplay">⚪ 等待開始</span>
            <span class="alert-sign" id="alertMessage">⏱️ 計時正常</span>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="bottom-btn btn-pause-bottom" id="btnPauseAll" type="button">⏸️ 全部暫停</button>
        <button class="bottom-btn btn-reset-bottom" id="btnReset" type="button">⟲ 長按重置所有</button>
    </div>
    <div class="footer-note">iPad 專業比賽版：已停用雙擊放大、限制縮放、加強防誤觸。<span class="reset-warning">重置鍵需長按 1 秒。</span></div>
</div>

<script>
(function() {
    'use strict';

    const DEFAULT_MINUTES = 4;
    const TICK_RATE_MS = 100;
    const WARNING_BEEP_COUNT = 3;
    const BEEP_INTERVAL_MS = 320;
    const RESET_HOLD_MS = 1000;

    let teamASeconds = DEFAULT_MINUTES * 60;
    let teamBSeconds = DEFAULT_MINUTES * 60;
    let teamALimitMin = DEFAULT_MINUTES;
    let teamBLimitMin = DEFAULT_MINUTES;
    let activeTurn = null;
    let teamAAlerted = false;
    let teamBAlerted = false;
    let timerInterval = null;
    let audioCtx = null;
    let audioEnabled = false;
    let resetHoldTimer = null;
    let resetTriggered = false;
    let lastTouchEnd = 0;

    const teamATimeDiv = document.getElementById('teamATime');
    const teamBTimeDiv = document.getElementById('teamBTime');
    const teamACard = document.getElementById('teamACard');
    const teamBCard = document.getElementById('teamBCard');
    const turnDisplay = document.getElementById('turnDisplay');
    const alertMessageSpan = document.getElementById('alertMessage');

    const teamALimitInput = document.getElementById('teamALimitInput');
    const teamBLimitInput = document.getElementById('teamBLimitInput');
    const btnAToggle = document.getElementById('btnAToggle');
    const btnBToggle = document.getElementById('btnBToggle');
    const btnPauseAll = document.getElementById('btnPauseAll');
    const btnReset = document.getElementById('btnReset');

    function formatTime(secondsTotal) {
        secondsTotal = Math.max(0, secondsTotal);
        const mins = Math.floor(secondsTotal / 60);
        const secs = Math.floor(secondsTotal % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
        teamATimeDiv.textContent = formatTime(teamASeconds);
        teamBTimeDiv.textContent = formatTime(teamBSeconds);
    }

    function updateActiveUI() {
        teamACard.classList.remove('active-turn');
        teamBCard.classList.remove('active-turn');

        if (activeTurn === 'teamA') {
            teamACard.classList.add('active-turn');
            turnDisplay.textContent = '🔴 隊伍A 作賽中';
            btnAToggle.textContent = '🔴 隊伍A 暫停';
            btnBToggle.textContent = '🔵 隊伍B 開始';
        } else if (activeTurn === 'teamB') {
            teamBCard.classList.add('active-turn');
            turnDisplay.textContent = '🔵 隊伍B 作賽中';
            btnAToggle.textContent = '🔴 隊伍A 開始';
            btnBToggle.textContent = '🔵 隊伍B 暫停';
        } else {
            turnDisplay.textContent = '⏸️ 暫停（無回合進行）';
            btnAToggle.textContent = '🔴 隊伍A 開始';
            btnBToggle.textContent = '🔵 隊伍B 開始';
        }
    }

    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioEnabled = true;
        } catch (e) {
            audioEnabled = false;
        }
    }

    function playBeep() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
    }

    function beep() {
        if (!audioEnabled || !audioCtx) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(playBeep).catch(() => {});
        } else {
            playBeep();
        }
    }

    function triggerBeeps(count) {
        initAudio();
        for (let i = 0; i < count; i++) {
            window.setTimeout(() => beep(), i * BEEP_INTERVAL_MS);
        }
    }

    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        activeTurn = null;
        updateActiveUI();
    }

    function checkAndAlert() {
        let updated = false;

        if (teamASeconds <= 0 && !teamAAlerted) {
            teamAAlerted = true;
            triggerBeeps(WARNING_BEEP_COUNT);
            alertMessageSpan.textContent = '⚠️ 隊伍A 超時！';
            if (activeTurn === 'teamA') pauseTimer();
            updated = true;
        }

        if (teamBSeconds <= 0 && !teamBAlerted) {
            teamBAlerted = true;
            triggerBeeps(WARNING_BEEP_COUNT);
            alertMessageSpan.textContent = '⚠️ 隊伍B 超時！';
            if (activeTurn === 'teamB') pauseTimer();
            updated = true;
        }

        if (!updated) {
            if (teamASeconds <= 0 && teamBSeconds <= 0) {
                alertMessageSpan.textContent = '⚠️ 兩隊均已超時';
            } else if (teamASeconds <= 0) {
                alertMessageSpan.textContent = '⚠️ 隊伍A 超時！';
            } else if (teamBSeconds <= 0) {
                alertMessageSpan.textContent = '⚠️ 隊伍B 超時！';
            } else {
                alertMessageSpan.textContent = '⏱️ 計時正常';
            }
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (activeTurn === 'teamA') {
                teamASeconds = Math.max(teamASeconds - 0.1, 0);
            } else if (activeTurn === 'teamB') {
                teamBSeconds = Math.max(teamBSeconds - 0.1, 0);
            } else {
                return;
            }

            updateDisplay();
            checkAndAlert();
        }, TICK_RATE_MS);
    }

    function toggleTeam(team) {
        initAudio();

        if (team === 'teamA' && teamASeconds <= 0) {
            alertMessageSpan.textContent = '⛔ 隊伍A 已超時，無法開始';
            triggerBeeps(1);
            return;
        }

        if (team === 'teamB' && teamBSeconds <= 0) {
            alertMessageSpan.textContent = '⛔ 隊伍B 已超時，無法開始';
            triggerBeeps(1);
            return;
        }

        if (activeTurn === team) {
            pauseTimer();
            return;
        }

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        activeTurn = team;
        if (team === 'teamA' && teamASeconds > 0) teamAAlerted = false;
        if (team === 'teamB' && teamBSeconds > 0) teamBAlerted = false;

        updateActiveUI();
        startTimer();
        checkAndAlert();
    }

    function pauseAll() {
        pauseTimer();
        checkAndAlert();
    }

    function normalizeInputValue(inputEl) {
        let val = parseInt(inputEl.value, 10);
        if (isNaN(val) || val < 1) val = 1;
        if (val > 99) val = 99;
        inputEl.value = val;
        return val;
    }

    function resetAll() {
        pauseAll();

        teamALimitMin = normalizeInputValue(teamALimitInput);
        teamBLimitMin = normalizeInputValue(teamBLimitInput);
        teamASeconds = teamALimitMin * 60;
        teamBSeconds = teamBLimitMin * 60;
        teamAAlerted = false;
        teamBAlerted = false;

        updateDisplay();
        updateActiveUI();
        alertMessageSpan.textContent = '⏱️ 已重置所有計時';
        triggerBeeps(1);
    }

    function addTapHandler(el, handler) {
        let touchHandled = false;

        el.addEventListener('touchstart', function() {
            touchHandled = false;
        }, { passive: true });

        el.addEventListener('touchend', function(e) {
            e.preventDefault();
            touchHandled = true;
            handler();
        }, { passive: false });

        el.addEventListener('click', function(e) {
            if (touchHandled) {
                touchHandled = false;
                e.preventDefault();
                return;
            }
            handler();
        });
    }

    function setupLongPressReset() {
        function startHold(e) {
            e.preventDefault();
            if (resetHoldTimer) clearTimeout(resetHoldTimer);
            resetTriggered = false;
            btnReset.textContent = '⟲ 請繼續按住...';
            alertMessageSpan.textContent = '⚠️ 長按 1 秒以重置';

            resetHoldTimer = setTimeout(() => {
                resetTriggered = true;
                resetAll();
                btnReset.textContent = '⟲ 長按重置所有';
                resetHoldTimer = null;
            }, RESET_HOLD_MS);
        }

        function cancelHold() {
            if (resetHoldTimer) {
                clearTimeout(resetHoldTimer);
                resetHoldTimer = null;
            }
            if (!resetTriggered) {
                btnReset.textContent = '⟲ 長按重置所有';
                checkAndAlert();
            }
        }

        btnReset.addEventListener('touchstart', startHold, { passive: false });
        btnReset.addEventListener('mousedown', startHold);
        btnReset.addEventListener('touchend', cancelHold);
        btnReset.addEventListener('touchcancel', cancelHold);
        btnReset.addEventListener('mouseup', cancelHold);
        btnReset.addEventListener('mouseleave', cancelHold);
        btnReset.addEventListener('contextmenu', e => e.preventDefault());
    }

    function preventDoubleTapZoom() {
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 350) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    }

    function enableAudioOnce() {
        initAudio();
        document.querySelectorAll('button').forEach(btn => {
            btn.removeEventListener('click', enableAudioOnce);
            btn.removeEventListener('touchend', enableAudioOnce);
        });
    }

    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', enableAudioOnce, { once: true });
        btn.addEventListener('touchend', enableAudioOnce, { once: true, passive: true });
    });

    addTapHandler(btnAToggle, () => toggleTeam('teamA'));
    addTapHandler(btnBToggle, () => toggleTeam('teamB'));
    addTapHandler(btnPauseAll, pauseAll);

    teamALimitInput.addEventListener('change', function() {
        normalizeInputValue(this);
    });

    teamBLimitInput.addEventListener('change', function() {
        normalizeInputValue(this);
    });

    teamALimitInput.addEventListener('focus', () => { document.body.style.overflow = 'auto'; });
    teamBLimitInput.addEventListener('focus', () => { document.body.style.overflow = 'auto'; });
    teamALimitInput.addEventListener('blur', () => { document.body.style.overflow = 'hidden'; });
    teamBLimitInput.addEventListener('blur', () => { document.body.style.overflow = 'hidden'; });

    setupLongPressReset();
    preventDoubleTapZoom();
    updateDisplay();
    updateActiveUI();
    checkAndAlert();
})();
</script>
</body>
</html>
